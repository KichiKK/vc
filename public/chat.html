<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VoiceChat — Canal vocal global avec audio spatial">
    <title>VoiceChat — Canal Vocal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="bg-particles" id="particles"></div>

    <header class="chat-header glass">
        <div class="header-left">
            <div class="header-logo">
                <svg viewBox="0 0 32 32" fill="none" width="32" height="32">
                    <circle cx="16" cy="16" r="14" stroke="url(#hGrad)" stroke-width="2" fill="none" />
                    <path d="M12 20c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="url(#hGrad)" stroke-width="2"
                        stroke-linecap="round" fill="none" />
                    <circle cx="16" cy="13" r="2.5" fill="url(#hGrad)" />
                    <defs>
                        <linearGradient id="hGrad" x1="0" y1="0" x2="32" y2="32">
                            <stop stop-color="#4fc3f7" />
                            <stop offset="1" stop-color="#7c4dff" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="header-info">
                <h1>VoiceChat</h1>
                <span class="header-status" id="channel-status">Déconnecté</span>
            </div>
        </div>
        <div class="header-right">
            <div class="user-badge glass-subtle" id="user-badge">
                <span class="user-avatar" id="user-avatar"></span>
                <span class="user-name" id="user-name"></span>
            </div>
            <button class="btn-icon" id="logout-btn" title="Déconnexion">
                <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                    <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
            </button>
        </div>
    </header>

    <main class="chat-main">
        <div class="connect-section">
            <div class="connect-ring" id="connect-ring">
                <div class="connect-ring-pulse" id="connect-pulse"></div>
                <button class="connect-btn" id="connect-btn">
                    <span class="connect-label" id="connect-label">CONNECT</span>
                    <svg class="connect-mic" viewBox="0 0 24 24" fill="none" width="32" height="32">
                        <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" />
                        <path d="M5 11a7 7 0 0014 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <p class="connect-hint" id="connect-hint">Cliquez pour rejoindre le canal vocal</p>
        </div>

        <div class="users-section" id="users-section">
            <div class="users-header">
                <h2>Utilisateurs connectés</h2>
                <span class="users-count" id="users-count">0</span>
            </div>
            <div class="users-grid" id="users-grid"></div>
        </div>
    </main>

    <div class="audio-container" id="audio-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/spatial.js"></script>
    <script src="/js/chat.js"></script>
</body>

</html>
