<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VoiceChat — Connectez-vous avec vos amis en vocal haute qualité">
  <title>VoiceChat — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="bg-particles" id="particles"></div>

  <div class="auth-container">
    <div class="auth-card glass">
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" />
            <path d="M18 28c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"
              fill="none" />
            <circle cx="24" cy="18" r="4" fill="url(#logoGrad)" />
            <path d="M12 32c2-4 6.5-7 12-7s10 3 12 7" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round"
              fill="none" opacity="0.5" />
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#4fc3f7" />
                <stop offset="1" stop-color="#7c4dff" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="logo-text">VoiceChat</h1>
        <p class="logo-sub">Audio spatial haute qualité</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Connexion</button>
        <button class="tab-btn" data-tab="register">Inscription</button>
      </div>

      <div id="login-tab" class="tab-content active">
        <form id="login-form" class="auth-form">
          <div class="input-group">
            <input type="email" id="login-email" placeholder=" " required autocomplete="email">
            <label for="login-email">Adresse email</label>
            <div class="input-line"></div>
          </div>
          <div class="input-group">
            <input type="password" id="login-password" placeholder=" " required autocomplete="current-password">
            <label for="login-password">Mot de passe</label>
            <div class="input-line"></div>
          </div>
          <button type="submit" class="btn btn-primary" id="login-btn">
            <span>Se connecter</span>
            <div class="btn-loader"></div>
          </button>
        </form>
      </div>

      <div id="register-tab" class="tab-content">
        <form id="register-form" class="auth-form">
          <div class="input-group">
            <input type="email" id="reg-email" placeholder=" " required autocomplete="email">
            <label for="reg-email">Adresse email</label>
            <div class="input-line"></div>
          </div>
          <div class="input-group">
            <input type="password" id="reg-password" placeholder=" " required minlength="6" autocomplete="new-password">
            <label for="reg-password">Mot de passe (6+ caractères)</label>
            <div class="input-line"></div>
          </div>
          <div class="input-group">
            <input type="text" id="reg-pseudo" placeholder=" " required autocomplete="username">
            <label for="reg-pseudo">Pseudo</label>
            <div class="input-line"></div>
          </div>
          <div class="input-group">
            <input type="text" id="reg-roblox" placeholder=" " required>
            <label for="reg-roblox">Pseudo Roblox</label>
            <div class="input-line"></div>
          </div>
          <button type="submit" class="btn btn-primary" id="register-btn">
            <span>Créer un compte</span>
            <div class="btn-loader"></div>
          </button>
        </form>
      </div>

      <div id="roblox-verify-section" class="verify-section hidden">
        <div class="verify-card glass">
          <div class="verify-icon">🎮</div>
          <h3>Vérification Roblox</h3>
          <p>Ajoutez cette phrase dans la description de votre profil Roblox :</p>
          <div class="code-display" id="roblox-code" style="font-size: 1.2rem; padding: 15px; margin: 20px 0;"></div>
          <p class="verify-hint">Puis cliquez sur le bouton ci-dessous pour vérifier</p>
          <button class="btn btn-secondary" id="verify-roblox-btn">
            <span>Vérifier mon compte Roblox</span>
            <div class="btn-loader"></div>
          </button>
        </div>
      </div>



      <div id="message-box" class="message-box hidden"></div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
